name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Build SPA
        run: npx vite build --config vite.spa.config.ts
      - name: Add 404.html for SPA routing
        run: cp dist-spa/client/index.html dist-spa/client/404.html
      - name: Add .nojekyll
        run: touch dist-spa/client/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist-spa/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
